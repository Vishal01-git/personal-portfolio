<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <!-- Logo Line Gradient (Neon Cyan to Blue) -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14F195" />
      <stop offset="50%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#2962FF" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rounded Square Background -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bgGrad)" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Logo Group -->
  <g transform="translate(116, 126)" filter="url(#glow)">
    
    <!-- Letter 'V' (Left Side) -->
    <path d="M 40 40 L 120 250 L 160 145" 
          fill="none" 
          stroke="url(#neonGrad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Letter 'P' (Right Side Interconnected) -->
    <path d="M 120 250 L 120 40 L 240 40 Q 280 40 280 90 Q 280 145 240 145 L 120 145" 
          fill="none" 
          stroke="url(#neonGrad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Decorative Pipeline Nodes (Circles) -->
    <circle cx="40" cy="40" r="18" fill="#14F195" />
    <circle cx="120" cy="250" r="18" fill="#00E5FF" />
    <circle cx="280" cy="90" r="18" fill="#2962FF" />
    <circle cx="120" cy="40" r="18" fill="#14F195" />

  </g>
</svg>
